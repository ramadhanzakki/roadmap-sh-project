<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Image Grid Layout</title>
</head>
<body>
    <section class="layout">
        <div class="image-grid">
            <figure class="grid-item item1">
                <img src="images/jasper-gribble-TTExgxV06KA-unsplash.jpg" alt="beach picture">
            </figure>
            <figure class="grid-item item2">
                <img src="images/premium_photo-1695582868702-5b0f91584d00.jpg" alt="coffee">
            </figure>
            <figure class="grid-item item3">
                <img src="images/florian-schmid-f1PzRPbqt0M-unsplash.jpg" alt="Building picture">
            </figure>
            <figure class="grid-item item4">
                <img src="images/pawel-czerwinski-Wuu6H3mI7UA-unsplash.jpg" alt="white room">
            </figure>
            <figure class="grid-item item5">
                <img src="images/bernhard-uTd-kylh7bE-unsplash.jpg" alt="door picture">
            </figure>
            <figure class="grid-item item6">
                <img src="images/premium_photo-1724863374168-cc3334387b81.jpg" alt="another beach">
            </figure>
        </div>
    </section>
</body>
</html>
